<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SparkMind - HR Analytics Dashboard</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Prompt', sans-serif; background-color: #f3f4f6; margin: 0; }
    /* ซ่อน Scrollbar แต่ยัง Scroll ได้ */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    function SparkMindDashboard() {
      const [activeMenu, setActiveMenu] = useState('overview');

      // Mock Data สำหรับ KPI
      const kpis = [
        { label: 'พนักงานที่ใช้งานระบบ', value: '412', trend: '+12%', color: 'text-blue-600', bg: 'bg-blue-100' },
        { label: 'ดัชนีสุขภาพใจเฉลี่ย', value: '7.8', trend: '+0.5', color: 'text-green-600', bg: 'bg-green-100' },
        { label: 'พนักงานกลุ่มเสี่ยง (Burnout)', value: '8%', trend: '-2%', color: 'text-red-600', bg: 'bg-red-100' },
        { label: 'รอให้คำปรึกษา', value: '5', trend: 'เคสด่วน 1', color: 'text-orange-600', bg: 'bg-orange-100' },
      ];

      // Mock Data สำหรับกราฟ
      const weeklyData = [
        { day: 'จันทร์', score: 85, color: '#34d399' },
        { day: 'อังคาร', score: 80, color: '#34d399' },
        { day: 'พุธ', score: 65, color: '#fbbf24' },
        { day: 'พฤหัสฯ', score: 45, color: '#ef4444' }, // วันที่กราฟตก
        { day: 'ศุกร์', score: 90, color: '#10b981' },
      ];

      // Mock Data แผนก
      const departments = [
        { name: 'Research & Development', users: 45, score: 8.2, status: 'ปกติ', statusColor: 'bg-green-100 text-green-700' },
        { name: 'Sales & Marketing', users: 120, score: 5.4, status: 'ความเครียดสูง', statusColor: 'bg-red-100 text-red-700' },
        { name: 'Customer Support', users: 85, score: 6.8, status: 'เฝ้าระวัง', statusColor: 'bg-yellow-100 text-yellow-700' },
        { name: 'Human Resources', users: 15, score: 8.5, status: 'ปกติ', statusColor: 'bg-green-100 text-green-700' },
      ];

      return (
        <div className="flex h-screen overflow-hidden bg-gray-50">
          
          {/* Sidebar */}
          <aside className="w-64 bg-white border-r border-gray-200 flex flex-col hidden md:flex">
            <div className="h-16 flex items-center px-6 border-b border-gray-200">
              <span className="text-2xl font-bold text-blue-600">Spark<span className="text-gray-800">Mind</span></span>
            </div>
            <nav className="flex-1 px-4 py-6 space-y-2">
              <button onClick={() => setActiveMenu('overview')} className={`w-full flex items-center px-4 py-3 rounded-xl transition ${activeMenu === 'overview' ? 'bg-blue-50 text-blue-700 font-semibold' : 'text-gray-600 hover:bg-gray-50'}`}> 📊 ภาพรวมองค์กร </button>
              <button onClick={() => setActiveMenu('departments')} className={`w-full flex items-center px-4 py-3 rounded-xl transition ${activeMenu === 'departments' ? 'bg-blue-50 text-blue-700 font-semibold' : 'text-gray-600 hover:bg-gray-50'}`}> 🏢 ข้อมูลแยกแผนก </button>
              <button onClick={() => setActiveMenu('consult')} className={`w-full flex items-center px-4 py-3 rounded-xl transition ${activeMenu === 'consult' ? 'bg-blue-50 text-blue-700 font-semibold' : 'text-gray-600 hover:bg-gray-50'}`}> 💬 จัดการเคสปรึกษา </button>
              <button onClick={() => setActiveMenu('resources')} className={`w-full flex items-center px-4 py-3 rounded-xl transition ${activeMenu === 'resources' ? 'bg-blue-50 text-blue-700 font-semibold' : 'text-gray-600 hover:bg-gray-50'}`}> 📚 จัดการคอนเทนต์ </button>
            </nav>
            <div className="p-4 border-t border-gray-200">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-full bg-gray-200 flex items-center justify-center text-gray-600 font-bold">HR</div>
                <div className="text-sm">
                  <p className="font-semibold text-gray-800">Admin Portal</p>
                  <p className="text-gray-500">Spark Global</p>
                </div>
              </div>
            </div>
          </aside>

          {/* Main Content */}
          <main className="flex-1 flex flex-col overflow-y-auto">
            {/* Topbar */}
            <header className="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8 sticky top-0 z-10">
              <h1 className="text-xl font-semibold text-gray-800">{activeMenu === 'overview' ? 'ภาพรวมสุขภาพใจ (Overview)' : 'ระบบจัดการ (Management)'}</h1>
              <div className="flex gap-4">
                <button className="px-4 py-2 bg-white border border-gray-300 rounded-lg text-sm font-medium hover:bg-gray-50 transition"> 📅 สัปดาห์นี้ </button>
                <button className="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition shadow-sm"> 📥 ดาวน์โหลด Report </button>
              </div>
            </header>

            {/* Dashboard Content */}
            <div className="p-8 max-w-7xl mx-auto w-full space-y-8">
              {/* Alert Banner */}
              <div className="bg-red-50 border-l-4 border-red-500 p-4 rounded-r-lg flex justify-between items-start">
                <div>
                  <h3 className="text-red-800 font-semibold">⚠️ แจ้งเตือนความเสี่ยงระดับแผนก</h3>
                  <p className="text-red-600 text-sm mt-1">
                    ระบบ AI ตรวจพบว่าทีม <strong>Sales & Marketing</strong> มีค่าความเครียดพุ่งสูงขึ้นผิดปกติในช่วง 3 วันที่ผ่านมา แนะนำให้ส่งทรัพยากรช่วยเหลือด่วน
                  </p>
                </div>
                <button className="text-red-700 font-medium text-sm hover:underline">ดูรายละเอียด &rarr;</button>
              </div>

              {/* KPI Grid */}
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                {kpis.map((kpi, idx) => (
                  <div key={idx} className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition">
                    <h3 className="text-gray-500 text-sm font-medium">{kpi.label}</h3>
                    <div className="mt-4 flex items-end justify-between">
                      <span className="text-3xl font-bold text-gray-800">{kpi.value}</span>
                      <span className={`text-sm font-semibold px-2 py-1 rounded-md ${kpi.bg} ${kpi.color}`}>{kpi.trend}</span>
                    </div>
                  </div>
                ))}
              </div>

              {/* Charts & Tables Area */}
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                {/* Bar Chart (CSS-based for demo) */}
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 lg:col-span-2">
                  <div className="flex justify-between items-center mb-6">
                    <h2 className="text-lg font-semibold text-gray-800">📊 แนวโน้มอารมณ์รวมขององค์กร</h2>
                    <span className="text-sm text-gray-500">ข้อมูลสัปดาห์ปัจจุบัน</span>
                  </div>
                  <div className="h-64 flex items-end justify-around pb-4 border-b border-gray-100 mt-8 relative">
                    {/* Background Grid Lines */}
                    <div className="absolute inset-0 flex flex-col justify-between pointer-events-none pb-4">
                      {[100, 75, 50, 25, 0].map(val => (
                        <div key={val} className="border-b border-gray-100 w-full h-0 flex items-center">
                          <span className="text-xs text-gray-400 absolute -left-6">{val}</span>
                        </div>
                      ))}
                    </div>

                    {/* Bars */}
                    {weeklyData.map((data, idx) => (
                      <div key={idx} className="flex flex-col items-center gap-3 z-10 w-full group">
                        <div className="w-16 h-full bg-gray-50 rounded-t-lg flex items-end justify-center overflow-hidden relative">
                          <div 
                            className="w-full rounded-t-lg transition-all duration-1000 ease-out group-hover:opacity-80"
                            style={{ height: `${data.score}%`, backgroundColor: data.color }}
                          ></div>
                          {/* Tooltip on hover */}
                          <div className="absolute bottom-full mb-2 opacity-0 group-hover:opacity-100 transition bg-gray-800 text-white text-xs py-1 px-2 rounded pointer-events-none">
                            Score: {data.score}
                          </div>
                        </div>
                        <span className="text-sm font-medium text-gray-600">{data.day}</span>
                      </div>
                    ))}
                  </div>
                </div>

                {/* Department Status Table */}
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                  <h2 className="text-lg font-semibold text-gray-800 mb-6">🏢 เจาะลึกรายแผนก</h2>
                  <div className="space-y-4">
                    {departments.map((dept, idx) => (
                      <div key={idx} className="p-4 rounded-xl border border-gray-100 hover:bg-gray-50 transition cursor-pointer">
                        <div className="flex justify-between items-start mb-2">
                          <h4 className="font-semibold text-gray-800 text-sm">{dept.name}</h4>
                          <span className={`text-xs px-2 py-1 rounded-full font-medium ${dept.statusColor}`}>{dept.status}</span>
                        </div>
                        <div className="flex justify-between text-xs text-gray-500">
                          <span>จำนวน: {dept.users} คน</span>
                          <span>คะแนน: <strong className="text-gray-800">{dept.score}/10</strong></span>
                        </div>
                      </div>
                    ))}
                  </div>
                  <button className="w-full mt-6 py-2 text-sm text-blue-600 font-medium hover:bg-blue-50 rounded-lg transition">ดูรายงานแผนกทั้งหมด &rarr;</button>
                </div>

              </div>
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<SparkMindDashboard />);
  </script>
</body>
</html>
